<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Framework Agent - Testing & Context Generator</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --border: #30363d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
        }

        /* Sidebar/Chat Area */
        .chat-container {
            width: 45%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            background: var(--bg-secondary);
        }

        .header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
        }

        .header h1 {
            margin: 0;
            font-size: 20px;
            color: var(--accent);
        }

        .header p {
            margin: 5px 0 0 0;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .chat-history {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
        }

        .message.user {
            align-self: flex-end;
            background: var(--accent);
            color: #0d1117;
            border-bottom-right-radius: 2px;
        }

        .message.agent {
            align-self: flex-start;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-bottom-left-radius: 2px;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            background: var(--bg-primary);
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }

        .input-area input:focus {
            border-color: var(--accent);
        }

        .input-area button {
            padding: 0 20px;
            border-radius: 6px;
            border: none;
            background: var(--accent);
            color: #0d1117;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .input-area button:hover {
            opacity: 0.9;
        }

        /* Context Viewer Area */
        .context-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
        }

        .context-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .context-header h2 {
            margin: 0;
            font-size: 16px;
        }

        .copy-btn {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .copy-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .context-viewer {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        pre {
            margin: 0;
            padding: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: Consolas, Monaco, monospace;
            font-size: 13px;
            white-space: pre-wrap;
            color: #a5d6ff;
            min-height: calc(100% - 40px);
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 12px 16px;
            color: var(--text-secondary);
            font-size: 13px;
            font-style: italic;
        }


        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 8px;
            font-size: 16px;
            /* Increased from 14px */
            line-height: 1.6;
        }

        .input-area input {
            flex: 1;
            padding: 16px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 16px;
            /* Increased from 14px */
            outline: none;
        }

        pre {
            margin: 0;
            padding: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: Consolas, Monaco, monospace;
            font-size: 15px;
            /* Increased from 13px */
            white-space: pre-wrap;
            color: #a5d6ff;
            min-height: calc(100% - 40px);
        }
    </style>
</head>

<body>
    <!-- Left Chat Area -->
    <div class="chat-container">
        <div class="header">
            <h1>Framework Agent</h1>
            <p>Your smart assistant for testing and code context.</p>
        </div>
        
        <div class="chat-history" id="chatHistory">
            <div class="message agent">
                Hello! I can help you test your application or generate context packs for LLMs. Please select a mode on the right to get started.
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="e.g., POST /api/auth/login or UserService.createUser..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <!-- Right Context Area -->
    <div class="context-container">
        <div class="header" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px;">
            <h1 style="margin:0;">Workspace</h1>
            
            <!-- Mode Selection -->
            <div style="display: flex; gap: 15px; align-items: center;">
                <label style="color: var(--text-primary); font-size: 14px; cursor: pointer;">
                    <input type="radio" name="agentMode" value="TEST_FEATURE" checked onchange="updateModeUI()"> Test Feature
                </label>
                <label style="color: var(--text-primary); font-size: 14px; cursor: pointer;">
                    <input type="radio" name="agentMode" value="CREATE_CONTEXT" onchange="updateModeUI()"> Create Context
                </label>
            </div>
        </div>

        <!-- Sub-options for Test Feature -->
        <div id="testOptions" style="padding: 15px 20px; background: var(--bg-tertiary); border-bottom: 1px solid var(--border); display: flex; gap: 20px;">
            <span style="font-size: 14px; color: var(--text-secondary);">Target Type:</span>
            <label style="color: var(--text-primary); font-size: 14px; cursor: pointer;">
                <input type="radio" name="testType" value="API" checked> API Endpoint
            </label>
            <label style="color: var(--text-primary); font-size: 14px; cursor: pointer;">
                <input type="radio" name="testType" value="SERVICE"> Service
            </label>
            <label style="color: var(--text-primary); font-size: 14px; cursor: pointer;">
                <input type="radio" name="testType" value="REPOSITORY"> Repository
            </label>
        </div>

        <!-- Action Buttons -->
        <div style="padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px;">
            <button onclick="copyContext()" style="padding: 8px 16px; background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); border-radius: 6px; cursor: pointer;">Copy Output</button>
        </div>

        <div class="context-content">
            <pre id="contextPack">Select a mode and tell me what you want to do in the chat.</pre>
        </div>
    </div>

    <script>
        function updateModeUI() {
            const mode = document.querySelector('input[name="agentMode"]:checked').value;
            const testOptions = document.getElementById('testOptions');
            const inputField = document.getElementById('userInput');
            
            if (mode === 'TEST_FEATURE') {
                testOptions.style.display = 'flex';
                inputField.placeholder = "e.g., POST /api/auth/login or UserService.createUser...";
            } else {
                testOptions.style.display = 'none';
                inputField.placeholder = "e.g., Get context for PostController create method...";
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        function addMessage(text, sender) {
            const history = document.getElementById('chatHistory');
            const msg = document.createElement('div');
            msg.className = `message ${sender}`;
            msg.textContent = text;
            history.appendChild(msg);
            history.scrollTop = history.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';

            const mode = document.querySelector('input[name="agentMode"]:checked').value;
            const testType = document.querySelector('input[name="testType"]:checked')?.value || 'NONE';

            // Show loading state
            document.getElementById('contextPack').textContent = "Processing...";

            // Send to our backend
            fetch('/api/agent-chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ 
                    message: text,
                    mode: mode,
                    testType: testType
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    addMessage(data.data.reply, 'agent');
                    if (data.data.context_pack) {
                        document.getElementById('contextPack').textContent = data.data.context_pack;
                    }
                } else {
                    addMessage('Error: ' + data.message, 'agent');
                    document.getElementById('contextPack').textContent = "Error occurred.";
                }
            })
            .catch(err => {
                addMessage('Connection failed.', 'agent');
                document.getElementById('contextPack').textContent = "Connection failed.";
            });
        }

        function copyContext() {
            const text = document.getElementById('contextPack').textContent;
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied to clipboard!');
            });
        }

        // Initialize UI
        updateModeUI();
    </script>
</body>


</html>
