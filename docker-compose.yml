version: '3'
services:
  web:
    build: .
    volumes:
      # 1. Sync local source code to container root for live updates
      - ./src:/var/www/html/src
      
      # 2. Persist the vendor directory generated during the build
      # (Prevents the volume above from overwriting installed dependencies)
      - /var/www/html/vendor
      
    env_file:
      - .env
    ports:
      - "80:80"
    depends_on:
      - db
  
  db:
    image: mysql:lts
    volumes:
      - db:/var/lib/mysql/
    environment:
      - MYSQL_ROOT_PASSWORD=abcd
      - MYSQL_DATABASE=testdb
      - MYSQL_USER=abh
      - MYSQL_PASSWORD=abcd
    ports:
      - "3306:3306"
      
  phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=db
    depends_on:
      - db

volumes:
  db:
